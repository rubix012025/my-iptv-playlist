name: Auto Update TVPass Playlist

on:
  schedule:
    - cron: '0 */6 * * *'  # Automatically runs every 6 hours
  workflow_dispatch:      # Adds a manual button so you can trigger it anytime

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright and System Dependencies
        run: |
          playwright install chromium
          npx playwright install-deps

      - name: Run Extraction Script
        run: python tvpass_generator.py

      - name: Commit and Push Updated Playlist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add exclusive.m3u
          git commit -m "Automated update of stream links" || echo "No changes to commit"
          git push
